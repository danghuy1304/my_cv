server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ============================================================
    # PROXY RIÊNG ROUTE HEALTHCHECK SANG BACKEND
    # ============================================================
    location /actuator/health {
        access_log off; # Tắt bớt log cho đỡ rác ổ cứng
        proxy_pass http://mycv_backend:8080/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    # SPA routing — fallback về index.html cho mọi route không tìm thấy file tĩnh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests đến backend service (ĐÃ FIX BỎ DẤU XUỆT ĐUÔI)
    location /api/v1 {
        proxy_pass http://mycv_backend:8080/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Hỗ trợ cookie HttpOnly (refresh token)
        proxy_pass_header Set-Cookie;
    }

    # Cache assets tĩnh
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}