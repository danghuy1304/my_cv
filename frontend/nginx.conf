server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ============================================================
    # PROXY RIÊNG ROUTE HEALTHCHECK SANG BACKEND
    # ============================================================
    location /actuator/health {
        access_log off; # Tắt bớt log cho đỡ rác ổ cứng
        proxy_pass http://mycv_backend:8080/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    # CẤU HÌNH ĐẨY THẲNG REQUEST LẤY ẢNH SANG CHO BACKEND XỬ LÝ
    # Dùng ^~ để ưu tiên match và không check regex sau đó
    location /uploads {
        proxy_pass http://mycv_backend:8080/uploads/avatars;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests đến backend service
    location /api/v1 {
        proxy_pass http://mycv_backend:8080/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
    }

    # SPA routing — fallback về index.html cho mọi route không tìm thấy file tĩnh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Khối dự phòng cho lệnh try_files phía trên
    location @backend_fallback {
        proxy_pass http://mycv_backend:8080;
    }

    # Cache assets tĩnh - CHỈ áp dụng cho file trong /usr/share/nginx/html
    # KHÔNG áp dụng cho /api/v1/uploads (đã được proxy ở trên)
    location ~* ^/(?!api/).*\.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}