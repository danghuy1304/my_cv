services:

  # ============================================================
  # Spring Boot Backend
  # ============================================================
  backend:
    build:
      context: ./backend/mycv
      dockerfile: Dockerfile
    container_name: mycv_backend
    restart: unless-stopped
    environment:
      DB_HOST: 192.168.53.104 
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mycv} 
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN: ${JWT_ACCESS_TOKEN:-600}
      JWT_REFRESH_TOKEN: ${JWT_REFRESH_TOKEN:-604800}
      # App
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      UPLOAD_DIR: /app/uploads
      # Security
      PASSWORD_SALT: ${PASSWORD_SALT}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - shared_net

  # ============================================================
  # React Frontend (Nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: mycv_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - shared_net

volumes:
  uploads_data:

networks:
  shared_net:
    external:
      name: shared_network